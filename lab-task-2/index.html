<html>
<head>
<link rel="stylesheet"  href="./style/style.css">
<script src="./script/script.js"></script>

</head>
<body>

    <form id="registrationForm" class="container" onsubmit="return validateForm()">
        <h2>Student Registation Form</h2>

        <label for="firstName">Fisrt Name <span class="required">*</span>:</label><br>
        <input type="text" id="firstName" name="firstName"><br>
        <p id="errFirstName" style="color: red;"></p><br>

        <label for="lastName">Last Name <span class="required">*</span>:</label><br>
        <input type="text" id="lastName" name="lastName"><br>
        <p id="errLastName" style="color: red;"></p><br>

        <label for="studentId">Student ID <span class="required">*</span>:</label><br>
        <input type="text" id="studentId" name="studentId"><br>
        <p id="errStudentId" style="color: red;"></p><br>

        <label for="email">Email <span class="required">*</span>:</label><br>
        <input type="email" id="email" name="email"><br>
        <p id="errEmail" style="color: red;"></p><br>

        <label for="creditCompleted">Credit Complete <span class="required">*</span>:</label><br>
        <input type="number" id="creditCompleted" name="creditCompleted"><br>
        <p id="errCreditCompleted" style="color: red;"></p><br>

        <label for="dept">Department <span class="required">*</span>:</label><br>
        <select id="dept" name="department">
            <option value="">Select Department</option>
            <option value="CSE">CSE</option>
            <option value="EEE">EEE</option>
            <option value="ME">ME</option>
            <option value="CE">CE</option>
            <option value="BBA">BBA</option>
        </select><br>
        <p id="errDept" style="color: red;"></p><br>

        <p class="button-container">
            <button type="submit">Submit</button>
        </p>
    </form>

    <h3>Registerd Student List</h3>
    <p id="total">Total Students: 0</p>
    <table id="studentTable" border="1">
        <tr>
            <th>Serial No</th>
            <th>Fisrt Name</th>
            <th>Last Name</th>
            <th>Student ID</th>
            <th>Email</th>
            <th>Credit Complete</th>
            <th>Department</th>
        </tr>
    </table>
</body>
</html>
