<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pental Shop</title>
    <link rel="stylesheet" href="./style/style.css">
</head>
<body>

    <h1>Welcome to Pental Shop</h1>

    <!-- Inventory Table -->
    <table>
        <thead>
            <tr>
                <th>Item Name</th>
                <th>Quantity</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Pencils</td>
                <td>100</td>
                <td>In Stock</td>
            </tr>
            <tr>
                <td>Notebooks</td>
                <td>50</td>
                <td>Low Stock</td>
            </tr>
            <tr>
                <td>Markers</td>
                <td>15</td>
                <td>In Stock</td>
            </tr>
        </tbody>
    </table>

    <!-- Contact Form -->
    <div class="contact-box">
        <h2>Contact Information</h2>

        <form>
            <div class="form-group">
                <label>Name</label>
                <input type="text">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email">
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea></textarea>
            </div>

            <button type="submit">Submit</button>
        </form>
    </div>

</body>
</html>
